<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bhandari Pariwar</title>
  <style>
    :root {
      --bg: #f6efe5;
      --card: #fffaf4;
      --text: #2f2419;
      --accent: #8b5a2b;
      --border: #dcc5a8;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #efe3d0 0%, var(--bg) 100%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(83, 58, 34, 0.08);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: var(--accent);
    }

    a {
      color: #7a3f16;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Bhandari Pariwar</h1>
    <p>This site hosts the public privacy policy for the Bhandari Pariwar app.</p>
    <p><a href="/privacy-policy.html">Open Privacy Policy</a></p>
  </main>
</body>
</html>
